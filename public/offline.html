<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#040d16" />
    <title>DisasterPH Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #040d16;
        color: #f4f7fb;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(251, 146, 60, 0.12), transparent 32rem),
          linear-gradient(135deg, #040d16, #081421 58%, #040d16);
      }

      main {
        width: min(32rem, calc(100vw - 2rem));
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 1.25rem;
        background: rgba(9, 18, 30, 0.9);
        padding: 1.5rem;
        box-shadow: 0 1.5rem 4rem rgba(0, 0, 0, 0.42);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        border: 1px solid rgba(251, 146, 60, 0.35);
        border-radius: 999px;
        background: rgba(251, 146, 60, 0.1);
        color: #fed7aa;
        padding: 0.35rem 0.7rem;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 1rem 0 0.5rem;
        font-size: clamp(1.7rem, 8vw, 2.6rem);
        line-height: 1;
      }

      p {
        color: #9aa8ba;
        line-height: 1.6;
      }

      a {
        margin-top: 1rem;
        display: inline-flex;
        border-radius: 0.85rem;
        background: #fb923c;
        color: #111827;
        padding: 0.8rem 1rem;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Offline Mode</span>
      <h1>DisasterPH is offline</h1>
      <p>
        You can still reopen cached pages and last-known alerts if they were loaded
        before the signal dropped. Reconnect to refresh official PAGASA, PHIVOLCS,
        and EONET updates.
      </p>
      <a href="/">Open last-known dashboard</a>
    </main>
  </body>
</html>
